# Configuration for the NGX Dangote daily digest.
#
# The three publicly listed Dangote companies on the NGX. When the Dangote
# Petroleum Refinery completes its planned IPO, add it under `tickers` and the
# pipeline will pick it up with no code changes.

source:
  name: ngx-official-statistics
  # Official NGX equities-statistics endpoint — the keyless JSON feed that
  # powers the public "Equities Price List" page. Returns one record per
  # listed equity (Open/High/Low/Close/PrevClose/Volume/TradeDate), so a
  # single request covers every ticker below. Data is ~30 minutes delayed.
  # robots.txt: none on doclib.ngxgroup.com; ngxgroup.com only disallows
  # /wp-admin/. Educational / non-commercial use only — NGX asserts copyright
  # over its market data, so do not redistribute it commercially.
  base_url: "https://doclib.ngxgroup.com/REST/api/statistics/equities/?market=&sector=&orderby=&pageSize=300&pageNo=0"
  # Optional per-ticker enrichment: NGX company-profile page carries market cap
  # and shares outstanding (server-rendered). One request per ticker; must
  # contain a {symbol} placeholder. Remove this key to skip enrichment.
  profile_url: "https://ngxgroup.com/exchange/data/company-profile/?symbol={symbol}&directory=companydirectory"
  # Identify your bot honestly and give a contact address.
  user_agent: "ngx-dangote-digest/0.1 (portfolio project; contact: you@example.com)"

tickers:
  - symbol: DANGCEM
    name: Dangote Cement
  - symbol: DANGSUGAR
    name: Dangote Sugar Refinery
  - symbol: NASCON
    name: NASCON Allied Industries
  # - symbol: DANGREF            # uncomment once the refinery lists
  #   name: Dangote Petroleum Refinery
