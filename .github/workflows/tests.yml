name: Tests

# Runs the unit suite on every push and pull request. Parsing is decoupled
# from HTTP and covered by saved fixtures, so this never touches the network.

on:
  push:
    branches: ["main"]
  pull_request: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q
