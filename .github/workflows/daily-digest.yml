name: Daily NGX Digest

# Fetches the day's NGX quotes, commits the updated SQLite database AND the
# rendered Markdown digest back to the repo (so both history and a browsable
# report accumulate across ephemeral runs), then publishes the HTML report —
# with its inline SVG charts — to GitHub Pages.

on:
  schedule:
    # 15:00 UTC = 16:00 WAT — well after the NGX close (~14:30 WAT) and past
    # the source's ~30-minute delay. Weekdays only; the trading-calendar check
    # in the app still skips NGX public holidays once that set is populated.
    - cron: "0 15 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Fetch even on a non-trading day (weekend/holiday) — for end-to-end testing"
        type: boolean
        default: false

# contents: write -> push DB + Markdown; pages/id-token -> deploy to Pages;
# models: read -> GitHub Models inference for the LLM narrative.
permissions:
  contents: write
  pages: write
  id-token: write
  models: read

# Never let two daily runs race on the commit-back / deploy.
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Check out repository (with committed history DB)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Fetch today's quotes
        # `force` is only set for manual runs; scheduled runs leave it falsy.
        # Safe even on a weekend: the stored row keys on the source's own
        # TradeDate, so forcing just re-fetches the latest session in place.
        run: ngx-digest ${{ inputs.force && '--force' || '' }}

      - name: Inspect database
        id: data
        # Expose the row count and latest session date. On a non-trading day
        # the fetch is skipped, so an empty/absent DB yields rows=0 and the
        # report/Pages steps below are skipped — no empty digest is committed.
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os, sqlite3
          rows, day = 0, ""
          p = "data/quotes.db"
          if os.path.exists(p):
              try:
                  con = sqlite3.connect(p)
                  rows = con.execute("SELECT COUNT(*) FROM quotes").fetchone()[0]
                  day = con.execute("SELECT MAX(trade_date) FROM quotes").fetchone()[0] or ""
              except sqlite3.Error:
                  rows, day = 0, ""
          print(f"rows={rows}")
          print(f"date={day}")
          PY

      - name: Render reports
        if: steps.data.outputs.rows != '0'
        # GITHUB_TOKEN (with models: read) authenticates the GitHub Models call
        # behind --summarize; if it is unavailable the report renders narrative-
        # free. Summarize once, reuse the text across all output formats.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DAY="${{ steps.data.outputs.date }}"   # key archive by session date
          mkdir -p reports/history _site
          # Markdown: a stable latest + a dated archive entry (committed).
          ngx-report --format md   --summarize --out "reports/latest.md"
          ngx-report --format md   --summarize --out "reports/history/${DAY}.md"
          # HTML for Pages (not committed; published as a Pages artifact).
          ngx-report --format html --summarize --out "_site/index.html"

      - name: Commit database and Markdown report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # quotes.db is gitignored for local dev, so force-add it here.
          git add -f data/quotes.db
          # Only stage reports when there is data (skips empty non-trading days).
          if [ "${{ steps.data.outputs.rows }}" != "0" ]; then
            git add reports/latest.md reports/history/
          fi
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "data: NGX digest for ${{ steps.data.outputs.date }}"
            git push
          fi

      - name: Upload Pages artifact
        if: steps.data.outputs.rows != '0'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        if: steps.data.outputs.rows != '0'
        id: deploy
        uses: actions/deploy-pages@v4
